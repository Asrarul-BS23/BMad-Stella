# <!-- Powered by Stella Development Team -->

template:
  id: implementation-plan-template-v2
  name: Implementation Plan Document
  version: 2.0
  output:
    format: markdown
    filename: bmad-docs/impl-plan/{{plan_id}}-{{ticket_title_short}}.md
    title: "Implementation Plan: {{plan_id}} - {{title}}"

workflow:
  mode: interactive
  elicitation: advanced-elicitation

agent_config:
  editable_sections:
    - Status
    - Ticket Information
    - Requirements
    - Acceptance Criteria
    - Technical Approach
    - Bug Fix Details
    - Feature Details
    - Migration Details
    - Tasks / Subtasks
    - Dependencies and Risks
    - Change Log
    - Feedback

sections:
  - id: status
    title: Status
    type: choice
    choices: [Draft - Awaiting Review, Approved, In Progress, Under Review, Completed]
    instruction: Select the current status of the implementation plan
    owner: planner
    editors: [planner, dev-agent]

  - id: ticket-info
    title: Ticket Information
    instruction: Core information about the task — from JIRA ticket, direct instruction, or input file
    owner: planner
    editors: [planner]
    sections:
      - id: plan-id
        title: Plan ID
        type: text
        template: "{{plan_id}}"
        elicit: true
        owner: planner
        editors: [planner]

      - id: ticket-type
        title: Ticket Type
        type: choice
        choices: [Bug, Feature, Migration]
        elicit: true
        owner: planner
        editors: [planner]

      - id: ticket-subtype
        title: Ticket Subtype
        type: choice
        choices: [Stack Version, Architecture Pattern, Infrastructure, Data, Hybrid, N/A]
        elicit: true
        owner: planner
        editors: [planner]

      - id: title
        title: Title
        type: text
        template: "{{title}}"
        instruction: Brief, descriptive title of the ticket
        elicit: true
        owner: planner
        editors: [planner]

      - id: input-source
        title: Input Source
        type: text
        instruction: 'Origin of requirements (e.g., JIRA URL/key, file path, or "Direct instruction").'
        elicit: true
        owner: planner
        editors: [planner]

      - id: description
        title: Description
        type: multiline-text
        instruction: Full description from source (JIRA ticket, user instruction, or input file)
        elicit: true
        owner: planner
        editors: [planner]

  - id: requirements
    title: Requirements
    type: numbered-list
    instruction: Numbered list of testable functional and non-functional requirements.
    elicit: true
    owner: planner
    editors: [planner]

  - id: acceptance-criteria
    title: Acceptance Criteria
    type: numbered-list
    instruction: Numbered list of testable conditions. See create-implementation-plan.md §5 for derivation rules.
    elicit: true
    owner: planner
    editors: [planner]

  - id: technical-approach
    title: Technical Approach
    instruction: Structured technical strategy written by planner as a senior developer guiding junior developers.
    elicit: true
    owner: planner
    editors: [planner]
    sections:
      - id: current-state
        title: Current State
        type: multiline-text
        owner: planner
        editors: [planner]

      - id: target-state
        title: Target State
        type: multiline-text
        owner: planner
        editors: [planner]

      - id: transformation-strategy
        title: Transformation Strategy
        type: multiline-text
        owner: planner
        editors: [planner]

      - id: integration-points
        title: Integration Points
        type: multiline-text
        owner: planner
        editors: [planner]

      - id: pattern-conformance
        title: Pattern Conformance
        type: multiline-text
        owner: planner
        editors: [planner]

      - id: reuse-opportunities
        title: Reuse Opportunities
        type: multiline-text
        owner: planner
        editors: [planner]

  # ============================================================
  # TYPE-SPECIFIC SECTIONS
  # Only populate the section matching the ticket type.
  # Leave the others empty or omit them in the output.
  # ============================================================

  - id: bugfix-details
    title: Bug Fix Details
    owner: planner
    editors: [planner]
    sections:
      - id: root-cause-analysis
        title: Root Cause Analysis
        type: multiline-text
        owner: planner
        editors: [planner]

      - id: reproduction-steps
        title: Reproduction Steps
        type: numbered-list
        owner: planner
        editors: [planner]

      - id: affected-code-path
        title: Affected Code Path
        type: multiline-text
        owner: planner
        editors: [planner]

      - id: fix-scope-boundary
        title: Fix Scope Boundary
        type: multiline-text
        owner: planner
        editors: [planner]

  - id: feature-details
    title: Feature Details
    owner: planner
    editors: [planner]
    sections:
      - id: existing-patterns-to-follow
        title: Existing Patterns to Follow
        type: multiline-text
        owner: planner
        editors: [planner]

  - id: migration-details
    title: Migration Details
    owner: planner
    editors: [planner]
    sections:
      - id: reference-implementation
        title: Reference Implementation
        type: multiline-text
        owner: planner
        editors: [planner]

      - id: source-state
        title: Source State
        type: multiline-text
        owner: planner
        editors: [planner]

      - id: target-state-migration
        title: Target State
        type: multiline-text
        owner: planner
        editors: [planner]

      - id: source-architecture-reference
        title: Source Architecture Reference
        type: text
        owner: planner
        editors: [planner]

      - id: target-architecture-reference
        title: Target Architecture Reference
        type: text
        owner: planner
        editors: [planner]

      - id: transformation-map
        title: Transformation Map
        type: multiline-text
        owner: planner
        editors: [planner]

      - id: migration-strategy
        title: Migration Strategy
        type: multiline-text
        owner: planner
        editors: [planner]

      - id: rollback-plan
        title: Rollback Plan
        type: multiline-text
        owner: planner
        editors: [planner]

      - id: health-criteria
        title: Health Criteria
        type: multiline-text
        owner: planner
        editors: [planner]

      - id: do-not-migrate
        title: Do Not Migrate
        type: multiline-text
        owner: planner
        editors: [planner]

  - id: tasks-subtasks
    title: Tasks / Subtasks
    type: bullet-list
    instruction: |
      Sequential task breakdown with [ ] checkboxes. Reference acceptance criteria as (AC: #). See create-implementation-plan.md §7 for granularity and testing rules.
    template: |
      - [ ] Task 1 (AC: # if applicable)
        - [ ] Subtask 1.1...
      - [ ] Task 2 (AC: # if applicable)
        - [ ] Subtask 2.1...
      - [ ] Task 3 (AC: # if applicable)
        - [ ] Subtask 3.1...
    elicit: true
    owner: planner
    editors: [planner, dev-agent]

  - id: dependencies-and-risks
    title: Dependencies and Risks
    owner: planner
    editors: [planner]
    sections:
      - id: dependencies
        title: Dependencies
        owner: planner
        editors: [planner]

      - id: blockers
        title: Blockers
        owner: planner
        editors: [planner]

  - id: test-implementation-notes
    title: Testing
    instruction: |
      This section is populated by the qa agent during test implementation.
      Planner: Document testing requirements in the Tasks/Subtasks section.
      QA agent: Document test implementation details, coverage, and results here.
    owner: qa-agent
    editors: [qa-agent]

  - id: change-log
    title: Change Log
    type: table
    columns: [Date, Version, Description, Author]
    instruction: Track changes made to this implementation plan
    owner: planner
    editors: [planner, dev-agent]

  - id: security-violations
    title: Security Violations
    type: bullet-list
    instruction: |
      Populated by the security agent (Sam) after running *check-frontend or *check-backend commands
      against the implemented plan. Do NOT populate this section manually.
      Security agent will replace this entire section on re-audit to reflect the latest state.
      Dev agent (Bob) resolves each violation and marks its checkbox [x] when the fix is applied.
    owner: security-agent
    editors: [security-agent, dev-agent]

  - id: dev-agent-record
    title: Dev Agent Record
    instruction: This section is populated by the development agent during implementation
    owner: dev-agent
    editors: [dev-agent]
    sections:
      - id: agent-model
        title: Agent Model Used
        template: "{{agent_model_name_version}}"
        instruction: Record the specific AI agent model and version used for development
        owner: dev-agent
        editors: [dev-agent]

      - id: pre-implementation-baseline
        title: Pre-Implementation Baseline
        instruction: |
          Captured by dev agent before implementation starts.
          - Test results snapshot: pass count, fail count, skip count
          - Build state snapshot: success/failure, warning count
          - Folder structure snapshot (for migrations): affected directory tree
          - Current API contracts (for migrations affecting interfaces)
          This baseline enables before/after comparison at completion.
        owner: dev-agent
        editors: [dev-agent]

      - id: debug-log
        title: Debug Log
        instruction: Reference any debug logs or traces generated during development or qa-testing
        owner: dev-agent
        editors: [dev-agent, qa-agent]

      - id: completion-notes
        title: Completion Notes
        instruction: |
          Key decisions, deviations, and context from implementation sessions.
          Each entry should include session date and brief description.
          This section enables session continuity — future sessions read this
          to understand what was done and why.
          - Approach taken and any deviations from original plan
          - Key decisions made during implementation
          - Known limitations or tech debt introduced
          - Recommendations for follow-up work
          - Per-task rollback notes (migration only)
        owner: dev-agent
        editors: [dev-agent]

      - id: file-list
        title: File List
        instruction: List all files created, modified, or affected during implementation
        owner: dev-agent
        editors: [dev-agent]

  - id: deviation-record
    title: Deviation Record
    type: multiline-text
    instruction: |
      Documents where actual implementation diverged from the planned Technical Approach.
      Each entry records three fields:
      - Planned: what the Technical Approach specified
      - Actual: what was actually implemented
      - Reason: why the deviation was necessary

      This section bridges the gap between the frozen plan and the implementation truth.
      The Technical Approach stays as the original intent (useful for review),
      and the Deviation Record tells what actually happened.
      Reviewers and future developers should read both sections together.
    owner: dev-agent
    editors: [dev-agent]

  - id: feedback
    title: Feedback
    type: multiline-text
    instruction: |
      Consolidated feedback from reviews and refinements.
      Include feedback from planner reviews, code reviews, or QA testing.
      Use Change Log to track when feedback was incorporated.
    owner: planner
    editors: [planner, dev-agent, qa-agent]
