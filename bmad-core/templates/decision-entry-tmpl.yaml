# Powered by BMAD™ Core
# Templates for ledger entries. Used by scribe-protocol.md.

decision:
  format: |
    ## DEC-{date}-{seq}  {title}
    why: {reason}
    ref: {ref}
    agent: {agent}
    tags: [{tags}]
  fields:
    title: { max_words: 8, required: true }
    why: { max_chars: 80, required: true }
    ref: { default: "—", description: "ticket-id or DEC-id" }
    agent: { required: true }
    tags: { min: 1, max: 5, required: true }

action:
  format: |
    ## ACT-{date}-{seq}  {title}
    where: {where}
    ref: {ref}
    agent: {agent}
    tags: [{tags}]
  fields:
    title: { max_words: 8, required: true }
    where: { max_chars: 80, required: true, description: "file path or system" }
    ref: { default: "—" }
    agent: { required: true }
    tags: { min: 1, max: 5, required: true }

question:
  format: |
    ## OQ-{date}-{seq}  {title}
    context: {context}
    agent: {agent}
    tags: [{tags}]
  fields:
    title: { max_words: 8, required: true }
    context: { max_chars: 80, required: true }
    agent: { required: true }
    tags: { min: 1, max: 5, required: true }

markers:
  superseded: "> [SUPERSEDED] {date} → {new_id}"
  revoked: "> [REVOKED] {date} reason: {reason}"

style:
  total_lines_max: 3
  line_chars_max: 80
  forbidden:
    - code_blocks
    - bullet_lists
    - hedging_words: ["maybe", "i think", "perhaps", "probably"]
    - ai_commentary: ["interesting", "good idea", "nice"]
    - emojis
